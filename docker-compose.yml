version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - OPENCLAW_JWT_SECRET=${OPENCLAW_JWT_SECRET}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://clawdesk.space}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-https://clawdesk.space}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - OPENCLAW_DB_PATH=/data/mission_control.db
      - OPENCLAW_ENV=production
    volumes:
      - db_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=${VITE_API_URL:-https://clawdesk.space/api}
    restart: unless-stopped

volumes:
  db_data:
